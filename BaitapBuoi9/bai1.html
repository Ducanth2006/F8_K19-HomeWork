<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bài tập 1</title>
    <style>
      .root {
        box-sizing: border-box;
      }
      div {
        margin-bottom: 20px;
      }
      .square {
        width: 40px;
        height: 40px;
        border: 2px solid red;
      }
      .rectangle {
        width: 40px;
        height: 22px;
        border: 2px solid blue;
      }
      .triangle {
        width: 0px;
        height: 0px;
        border-left: 20px solid transparent;
        border-right: 20px solid transparent;
        border-bottom: 20px solid rgb(70, 236, 70);
      }
      .upsideTriangle {
        width: 0px;
        height: 0px;
        border-left: 20px solid transparent;
        border-right: 20px solid transparent;
        border-top: 20px solid rgb(239, 98, 17);
      }
      .leftTriangle {
        width: 0px;
        height: 0px;
        border-top: 20px solid transparent;
        border-bottom: 20px solid transparent;
        border-right: 20px solid rgb(211, 23, 232);
      }
      .rightTriangle {
        width: 0px;
        height: 0px;
        border-top: 20px solid transparent;
        border-bottom: 20px solid transparent;
        border-left: 20px solid rgb(216, 159, 16);
      }
      .tranpezium {
        width: 20px;
        height: px;
        border-bottom: 30px solid rgb(22, 224, 147);
        border-left: 20px solid transparent;
        border-right: 20px solid transparent;
      }
      .widthTriangle {
        width: 0px;
        height: 0px;
        border-bottom: 20px solid rgb(49, 14, 204);
        border-left: 40px solid transparent;
        border-right: 40px solid transparent;
      }
      .sharplyTriangle {
        width: 0px;
        height: 0px;
        border-bottom: 80px solid rgb(197, 112, 8);
        border-left: 20px solid transparent;
        border-right: 20px solid transparent;
      }
      .isoscelesTriangle {
        width: 0px;
        height: 0px;
        border-bottom: 40px solid brown;
        border-left: 40px solid transparent;
        border-right: 40px solid transparent;
      }
      .arrowRight {
        width: 0px;
        height: 0px;
        border-top: 20px solid transparent;
        border-bottom: 20px solid transparent;
        border-left: 20px solid rgb(14, 164, 42);
      }
      .arrowLeft {
        width: 0px;
        height: 0px;
        border-top: 20px solid transparent;
        border-bottom: 20px solid transparent;
        border-right: 20px solid rgb(188, 14, 204);
      }
      .rectangle_sub {
        display: inline-block;
        width: 80px;
        height: 40px;
        background-color: rgb(227, 86, 15);
      }
      .triangle_sub {
        display: inline-block;
        width: 0px;
        height: 0px;
        border-top: 20px solid transparent;
        border-bottom: 20px solid transparent;
        border-right: 20px solid white;
        margin-left: -24px;
      }
      .square-1 {
        width: 50px;
        height: 50px;
        border: 10px solid orangered;
        margin-bottom: 0px;
      }
      .square-2 {
        width: 50px;
        height: 50px;
        border: 10px solid orangered;
        margin-top: -10px;
        margin-bottom: 0px;
      }
      .firstLetter {
        display: inline-block;
      }
      .secondLetter {
        display: inline-block;
      }
      .f8 {
        margin-bottom: 0px;
      }
      .bar1 {
        display: inline-block;
        width: 70px;
        height: 10px;
        background-color: orangered;
        margin-bottom: -75px;
      }
      .bar2 {
        display: inline-block;
        width: 70px;
        height: 10px;
        background-color: orangered;
        margin-bottom: 140px;
      }
      .bar3 {
        display: inline-block;
        width: 10px;
        height: 130px;
        background-color: orangered;
        margin-left: -75px;
      }
    </style>
  </head>
  <body>
    <div class="square"></div>
    <div class="rectangle"></div>
    <div class="triangle"></div>
    <div class="upsideTriangle"></div>
    <div class="leftTriangle"></div>
    <div class="rightTriangle"></div>
    <div class="tranpezium"></div>
    <div class="widthTriangle"></div>
    <div class="sharplyTriangle"></div>
    <div class="isoscelesTriangle"></div>
    <div class="arrowRight"></div>
    <div class="arrowLeft"></div>
    <div class="ribbon">
      <div class="rectangle_sub"></div>
      <div class="triangle_sub"></div>
    </div>
    <div class="f8">
      <div class="firstLetter">
        <div class="bar1"></div>
        <div class="bar2"></div>
        <div class="bar3"></div>
      </div>
      <div class="secondLetter">
        <div class="square-1"></div>
        <div class="square-2"></div>
      </div>
    </div>
  </body>
</html>
