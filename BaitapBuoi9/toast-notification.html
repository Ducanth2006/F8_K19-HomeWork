<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Toast Notification</title>
    <style>
      /*Common  */
      .root {
        box-sizing: border-box;
      }
      input {
        display: none;
      }
      /* open button and toast */
      .open-btn,
      .toast {
        display: inline-block;
        text-align: center;
        vertical-align: top;
        width: 200px;
        height: 50px;
        padding: 8px;
        background-color: rgb(24, 23, 23);
        color: white;
      }
      /* Content of toast  */
      .content {
        margin: 0px;
        display: inline-block;
      }
      .close-btn {
        display: inline-block;
        padding: 0 10px;
        cursor: pointer;
      }
      .toast {
        margin-left: 20px;
        background-color: rgb(26, 223, 26);
        display: none;
      }
      .close-btn {
        padding: 10px;
        background-color: rgb(8, 134, 6);
      }
      /* Logic open and close */
      #toast-toggle:checked ~ .toast {
        display: inline-block;
      }
    </style>
  </head>
  <body>
    <input type="checkbox" name="open" id="toast-toggle" />
    <label for="toast-toggle" class="open-btn">Hiện thông báo</label>
    <div class="toast">
      <p class="content">Lưu thành công !</p>
      <input type="checkbox" name="close" id="close-btn" />
      <label for="toast-toggle" class="close-btn">X</label>
    </div>
  </body>
</html>
